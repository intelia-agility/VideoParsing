<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #mode-select {
      display: flex;
      gap: 12px;
    }

    .mode-btn {
      padding: 8px 20px;
      font-size: 0.9rem;
      background: #16213e;
      color: #eee;
      border: 2px solid #0f3460;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 1px;
    }

    .mode-btn:hover { background: #0f3460; }
    .mode-btn.active { background: #e94560; border-color: #e94560; }

    #difficulty-select {
      display: none;
      gap: 10px;
    }

    #difficulty-select.visible { display: flex; }

    .diff-btn {
      padding: 6px 16px;
      font-size: 0.8rem;
      background: #16213e;
      color: #ccc;
      border: 2px solid #0f3460;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .diff-btn:hover { background: #0f3460; }
    .diff-btn.active { background: #0f3460; border-color: #a8dadc; color: #a8dadc; }

    #status {
      font-size: 1.2rem;
      height: 1.6em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { filter: brightness(1); }
      to   { filter: brightness(1.5); }
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 10px 24px;
      border-radius: 10px;
    }

    .score-box .label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .val   { font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score .val { color: #e94560; }
    .score-box.o-score .val { color: #a8dadc; }
    .score-box.d-score .val { color: #aaa; }

    #restart {
      padding: 10px 32px;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 1px;
    }

    #restart:hover { background: #c73652; transform: scale(1.04); }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div id="mode-select">
    <button class="mode-btn" data-mode="pvp">2 Players</button>
    <button class="mode-btn active" data-mode="ai">vs AI</button>
  </div>

  <div id="difficulty-select" class="visible">
    <button class="diff-btn" data-diff="easy">Easy</button>
    <button class="diff-btn active" data-diff="medium">Medium</button>
    <button class="diff-btn" data-diff="hard">Unbeatable</button>
  </div>

  <div id="status">Your turn (X)</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scoreboard">
    <div class="score-box x-score">
      <div class="label" id="label-x">You (X)</div>
      <div class="val" id="score-x">0</div>
    </div>
    <div class="score-box d-score">
      <div class="label">Draws</div>
      <div class="val" id="score-d">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label" id="label-o">AI (O)</div>
      <div class="val" id="score-o">0</div>
    </div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, aiThinking;
    let mode = 'ai';
    let difficulty = 'medium';
    const scores = { X: 0, O: 0, D: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const scoreX  = document.getElementById('score-x');
    const scoreO  = document.getElementById('score-o');
    const scoreD  = document.getElementById('score-d');
    const labelX  = document.getElementById('label-x');
    const labelO  = document.getElementById('label-o');
    const diffSelect = document.getElementById('difficulty-select');

    // Mode buttons
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        diffSelect.classList.toggle('visible', mode === 'ai');
        labelX.textContent = mode === 'ai' ? 'You (X)' : 'Player X';
        labelO.textContent = mode === 'ai' ? 'AI (O)' : 'Player O';
        scores.X = 0; scores.O = 0; scores.D = 0;
        updateScores();
        init();
      });
    });

    // Difficulty buttons
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        difficulty = btn.dataset.diff;
        init();
      });
    });

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      aiThinking = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      updateStatus();
    }

    function updateStatus() {
      if (mode === 'ai') {
        status.textContent = current === 'X' ? "Your turn (X)" : "AI is thinking...";
      } else {
        status.textContent = `Player ${current}'s turn`;
      }
    }

    function updateScores() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreD.textContent = scores.D;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    function makeMove(i) {
      board[i] = current;
      cells[i].textContent = current;
      cells[i].classList.add(current.toLowerCase(), 'taken');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner) {
          result.line.forEach(idx => cells[idx].classList.add('win'));
          if (mode === 'ai') {
            status.textContent = result.winner === 'X' ? 'You win!' : 'AI wins!';
          } else {
            status.textContent = `Player ${result.winner} wins!`;
          }
          scores[result.winner]++;
        } else {
          status.textContent = "It's a draw!";
          scores.D++;
        }
        updateScores();
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      updateStatus();

      if (mode === 'ai' && current === 'O' && !gameOver) {
        aiThinking = true;
        setTimeout(() => {
          const move = getAiMove();
          makeMove(move);
          aiThinking = false;
        }, 300);
      }
    }

    // --- AI Logic ---

    function getEmptyCells(b) {
      return b.map((v, i) => v === null ? i : -1).filter(i => i !== -1);
    }

    function getAiMove() {
      if (difficulty === 'easy') return aiEasy();
      if (difficulty === 'medium') return aiMedium();
      return aiBestMove();
    }

    // Easy: random move
    function aiEasy() {
      const empty = getEmptyCells(board);
      return empty[Math.floor(Math.random() * empty.length)];
    }

    // Medium: 60% best move, 40% random
    function aiMedium() {
      return Math.random() < 0.6 ? aiBestMove() : aiEasy();
    }

    // Hard (Unbeatable): minimax
    function aiBestMove() {
      // Check for immediate win or block first for speed
      const empty = getEmptyCells(board);
      if (empty.length === 9) {
        // Pick a corner or center on first move
        return [0, 2, 4, 6, 8][Math.floor(Math.random() * 5)];
      }

      let bestScore = -Infinity;
      let bestMove = empty[0];

      for (const i of empty) {
        board[i] = 'O';
        const score = minimax(board, 0, false, -Infinity, Infinity);
        board[i] = null;
        if (score > bestScore) {
          bestScore = score;
          bestMove = i;
        }
      }
      return bestMove;
    }

    function minimax(b, depth, isMaximizing, alpha, beta) {
      const result = checkWinnerBoard(b);
      if (result === 'O') return 10 - depth;
      if (result === 'X') return depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMaximizing) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (b[i]) continue;
          b[i] = 'O';
          best = Math.max(best, minimax(b, depth + 1, false, alpha, beta));
          b[i] = null;
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (b[i]) continue;
          b[i] = 'X';
          best = Math.min(best, minimax(b, depth + 1, true, alpha, beta));
          b[i] = null;
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
        return best;
      }
    }

    function checkWinnerBoard(b) {
      for (const [a, bc, c] of WINS) {
        if (b[a] && b[a] === b[bc] && b[a] === b[c]) return b[a];
      }
      return null;
    }

    // --- Event Listeners ---

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i] || aiThinking) return;
        if (mode === 'ai' && current !== 'X') return;
        makeMove(i);
      });
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
